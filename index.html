<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saturação | RD Saúde</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --rd-purple: #4A148C;
            --rd-verde-oliva: #607D3B;
            --rd-laranja: #F26522;
            --bg-body: #F9FAFB;
            --white: #FFFFFF;
            --border: #E5E7EB;
            --text-main: #111827;
            --text-muted: #6B7280;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background-color: var(--white); padding: 12px 60px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .brand-name { font-weight: 700; color: var(--text-main); font-size: 1rem; }
        .brand-sub { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        nav { display: flex; gap: 8px; }
        .tab-btn { background: none; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-weight: 600; color: var(--text-muted); font-size: 0.85rem; transition: 0.2s; }
        .tab-btn.active { background-color: var(--rd-purple); color: var(--white); }

        main { flex: 1; padding: 30px 60px; overflow-y: auto; }
        .view { display: none; max-width: 1200px; margin: 0 auto; }
        .view.active { display: block; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--white); padding: 25px; border-radius: 12px; border: 1px solid var(--border); }
        .stat-val { font-size: 2.2rem; font-weight: 700; color: var(--text-main); display: block; margin-bottom: 5px; }
        .stat-label { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }

        /* Estilos do Formulário Multi-Registro */
        .form-card { background: var(--white); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; max-width: 900px; margin: 0 auto; }
        .form-body { padding: 30px; }
        .registro-item { background: #F9FAFB; padding: 20px; border-radius: 12px; border: 1px dashed #D1D5DB; margin-bottom: 20px; position: relative; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 8px; color: var(--text-main); }
        input, select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.9rem; box-sizing: border-box; }

        .btn-add { background: #f0f0f0; border: 2px dashed #ccc; width: 100%; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: 700; color: #666; margin-bottom: 20px; transition: 0.3s; }
        .btn-add:hover { background: #e0e0e0; border-color: var(--rd-purple); color: var(--rd-purple); }

        .sla-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .sla-btn { border: 1px solid var(--border); padding: 10px; text-align: center; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.75rem; background: white; color: var(--text-muted); }
        .sla-btn.selected { border-color: var(--rd-purple); background: #F3E5F5; color: var(--rd-purple); }

        .form-footer { padding: 20px 30px; background: #F9FAFB; border-top: 1px solid var(--border); text-align: right; }
        .btn-submit { background: var(--rd-verde-oliva); color: white; border: none; padding: 12px 40px; border-radius: 8px; font-weight: 700; cursor: pointer; }

        .data-table { width: 100%; border-collapse: collapse; background: var(--white); border: 1px solid var(--border); border-radius: 12px; }
        .data-table th { text-align: left; padding: 15px; font-size: 0.75rem; color: var(--text-muted); border-bottom: 1px solid var(--border); }
        .data-table td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .status-dot { color: var(--rd-laranja); font-weight: 700; }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <div class="brand-info">
            <div class="brand-name">SATURAÇÃO</div>
            <div class="brand-sub">RD SAÚDE OPERAÇÕES</div>
        </div>
    </div>
    <nav>
        <button class="tab-btn active" id="btn-dashboard" onclick="switchTab('dashboard')">Dashboard</button>
        <button class="tab-btn" id="btn-novo" onclick="switchTab('novo')">Novo Registro</button>
        <button class="tab-btn" id="btn-historico" onclick="switchTab('historico')">Histórico</button>
    </nav>
</header>

<main>
    <div id="dashboard" class="view active">
        <div class="stats-grid">
            <div class="stat-card"><span class="stat-val" id="dash-ativos">0</span><span class="stat-label">Eventos Ativos</span></div>
            <div class="stat-card"><span class="stat-val" id="dash-uf">0</span><span class="stat-label">UFs Impactadas</span></div>
            <div class="stat-card"><span class="stat-val">Online</span><span class="stat-label">Sincronização</span></div>
            <div class="stat-card"><span class="stat-val" id="dash-total">0</span><span class="stat-label">Total de Logs</span></div>
        </div>
    </div>

    <div id="novo" class="view">
        <div class="form-card">
            <div class="form-body">
                <div class="form-group">
                    <label>Nome da Contingência (Geral) *</label>
                    <input type="text" id="f-nome-geral" placeholder="Ex: Chuvas Sudeste">
                </div>
                <div class="form-group">
                    <label>Motivo Geral *</label>
                    <select id="f-motivo-geral">
                        <option>Chuva / Alagamento</option><option>Greve / Manifestação</option><option>Aumento de Demanda</option><option>Problema Sistêmico</option>
                    </select>
                </div>

                <hr style="border: 0; border-top: 1px solid var(--border); margin: 25px 0;">
                
                <div id="lista-registros">
                    <div class="registro-item">
                        <div class="form-row">
                            <div class="form-group">
                                <label>UF *</label>
                                <select class="f-uf">
                                    <option value="">Selecione...</option>
                                    <option value="SP">São Paulo</option><option value="RJ">Rio de Janeiro</option><option value="MG">Minas Gerais</option><option value="PR">Paraná</option><option value="RS">Rio Grande do Sul</option>
                                    <option value="BA">Bahia</option><option value="SC">Santa Catarina</option><option value="GO">Goiás</option><option value="DF">Distrito Federal</option>
                                    <option value="PE">Pernambuco</option><option value="CE">Ceará</option><option value="AM">Amazonas</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Localidade *</label>
                                <select class="f-localidade">
                                    <option>Capital</option><option>Interior</option><option>Ambos</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Cidade (Opcional)</label>
                                <input type="text" class="f-cidade" placeholder="Ex: Campinas">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>SLA Afetado *</label>
                            <div class="sla-selector" data-selected="">
                                <div class="sla-btn" onclick="setSLA(this, 'Turbo 60')">Turbo 60</div>
                                <div class="sla-btn" onclick="setSLA(this, 'Turbo 120')">Turbo 120</div>
                                <div class="sla-btn" onclick="setSLA(this, 'Brasil')">Brasil</div>
                                <div class="sla-btn" onclick="setSLA(this, 'D+1')">D+1</div>
                            </div>
                        </div>
                    </div>
                </div>

                <button class="btn-add" onclick="adicionarNovaLinha()">+ ADICIONAR OUTRA LOCALIDADE / UF</button>
            </div>
            <div class="form-footer">
                <button class="btn-submit" onclick="registrarMultiplosNoFirebase()">EFETIVAR TODOS OS REGISTROS</button>
            </div>
        </div>
    </div>

    <div id="historico" class="view">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Operação</th><th>UF</th><th>Localidade</th><th>SLA</th><th>Data/Hora</th><th>Status</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCwenDkxrlHTTsS0NIxrF0AKk-bvM8HB4A",
        authDomain: "registro-de-contigencia.firebaseapp.com",
        projectId: "registro-de-contigencia",
        storageBucket: "registro-de-contigencia.appspot.com",
        messagingSenderId: "75940460409",
        appId: "1:75940460409:web:59ad9ac9b61be295f8e1a8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.switchTab = (id) => {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
    };

    // Função para selecionar SLA em cada bloco
    window.setSLA = (el, val) => {
        const parent = el.closest('.sla-selector');
        parent.querySelectorAll('.sla-btn').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
        parent.setAttribute('data-selected', val);
    };

    // Função para adicionar nova caixinha de localidade
    window.adicionarNovaLinha = () => {
        const container = document.getElementById('lista-registros');
        const novoItem = container.firstElementChild.cloneNode(true);
        
        // Limpar campos do clone
        novoItem.querySelector('.f-cidade').value = '';
        novoItem.querySelector('.f-uf').value = '';
        novoItem.querySelector('.sla-selector').setAttribute('data-selected', '');
        novoItem.querySelectorAll('.sla-btn').forEach(b => b.classList.remove('selected'));
        
        container.appendChild(novoItem);
    };

    // Sincronização em tempo real
    const q = query(collection(db, "logs"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snapshot) => {
        const tableBody = document.getElementById('table-body');
        tableBody.innerHTML = "";
        let count = 0; let ufs = new Set();

        snapshot.forEach((doc) => {
            const d = doc.data();
            count++; if(d.uf) ufs.add(d.uf);
            tableBody.innerHTML += `
                <tr>
                    <td><b>${d.nome}</b><br><small style="color:var(--text-muted)">${d.motivo}</small></td>
                    <td>${d.uf}</td>
                    <td>${d.localidade} ${d.cidade ? '('+d.cidade+')' : ''}</td>
                    <td><b style="color:var(--rd-purple)">${d.sla}</b></td>
                    <td>${d.data}</td>
                    <td class="status-dot">● ATIVO</td>
                </tr>`;
        });
        document.getElementById('dash-total').innerText = count;
        document.getElementById('dash-ativos').innerText = count;
        document.getElementById('dash-uf').innerText = ufs.size;
    });

    // Registrar múltiplos itens
    window.registrarMultiplosNoFirebase = async () => {
        const nomeGeral = document.getElementById('f-nome-geral').value;
        const motivoGeral = document.getElementById('f-motivo-geral').value;
        const itens = document.querySelectorAll('.registro-item');
        
        if(!nomeGeral) { alert("Informe o nome da contingência."); return; }

        let promessas = [];
        const dataHora = new Date().toLocaleString('pt-BR');
        const ts = Date.now();

        itens.forEach(item => {
            const uf = item.querySelector('.f-uf').value;
            const loc = item.querySelector('.f-localidade').value;
            const cid = item.querySelector('.f-cidade').value;
            const sla = item.querySelector('.sla-selector').getAttribute('data-selected');

            if(uf && sla) {
                promessas.push(addDoc(collection(db, "logs"), {
                    nome: nomeGeral,
                    motivo: motivoGeral,
                    uf: uf,
                    localidade: loc,
                    cidade: cid,
                    sla: sla,
                    data: dataHora,
                    timestamp: ts
                }));
            }
        });

        if(promessas.length === 0) { alert("Preencha UF e SLA de pelo menos um item."); return; }

        try {
            await Promise.all(promessas);
            alert(`${promessas.length} registros sincronizados com sucesso!`);
            location.reload(); // Recarrega para limpar o formulário
        } catch (e) { alert("Erro ao salvar. Verifique a conexão."); }
    };
</script>
</body>
</html>
